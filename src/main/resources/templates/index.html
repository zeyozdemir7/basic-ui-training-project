<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelter — Home</title>
  <style>
    body { font-family: sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    nav { background: #f1f5f9; padding: 0.6rem 1rem; border-radius: 6px; margin-bottom: 1.5rem; }
    nav a { margin-right: 1rem; text-decoration: none; color: #2563eb; }
    nav a:hover { text-decoration: underline; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 0.4rem; }
    .cta { display: inline-block; margin-top: 1rem; padding: 0.6rem 1.2rem;
           background: #2563eb; color: white; border-radius: 4px; text-decoration: none; }
    .cta:hover { background: #1d4ed8; }
  </style>

<body>


  <nav>
    <a href="/static">Home</a>
    <a href="/animals">All animals</a>
    <a href="/animals/new" th:if="${isAdmin}">Add animal</a>
  </nav>

  <main>
    <h1>Welcome to the Shelter</h1>
    <p>We care for cats, dogs, and other animals looking for a loving home.</p>
    <p>Browse our available animals or register a new arrival.</p>
    <a href="/animals" class="cta">See all animals</a>
  </main>

</body>
